constitution:
  version: "1.0"
  owner: "zdx"
  intent: "Preserve long-term judgment continuity under delegated execution."

clauses:
  - clause_id: "pr_0001"
    title: "Execution and judgment separation"
    statement: "Execution may scale through agents, but strategic judgment authority remains owner-governed."
    rationale: "Prevents local optimization from replacing long-horizon direction."
    override_policy: "allowed_with_owner_confirmation"

  - clause_id: "pr_0002"
    title: "Append-only audit integrity"
    statement: "Historical logs are append-only. Strategic changes require explicit amendment or exception trail."
    rationale: "Ensures accountability and longitudinal auditability."
    override_policy: "disallowed"

  - clause_id: "pr_0003"
    title: "Long-term compounding over short-term noise"
    statement: "When tradeoffs conflict, decisions should prioritize long-term compounding value over short-term urgency."
    rationale: "Protects directional coherence under pressure."
    override_policy: "allowed_with_timeboxed_exception"
