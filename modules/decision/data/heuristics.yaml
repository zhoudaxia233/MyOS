meta:
  scope: "decision_tactical_playbook"
  constitutional_source: "modules/principles/data/constitution.yaml"

priorities_ordering:
  guideline: "Decide priorities by long-term compounding value first, then urgency."
  placeholders:
    - "Protect health / sleep baseline before optimization work."
    - "Reserve focused blocks for highest-leverage project work."
    - "Batch low-value admin tasks."

risk_rules:
  guideline: "Prevent irreversible damage before pursuing upside."
  position_sizing_discipline:
    - "Define max loss before entry (placeholder)."
    - "Reduce size when conviction is low or information is incomplete."
    - "Avoid adding risk after emotional losses."

project_selection_heuristics:
  guideline: "Select projects with clear feedback loops and reusable outputs."
  placeholders:
    - "Prefer projects that improve a repeatable system."
    - "Reject projects with vague success criteria."
    - "Ask: what evidence would prove this is working in 2 weeks?"

reverse_thinking_checks:
  guideline: "Before high-impact execution, run reverse checks to avoid local-optimum traps."
  checklist:
    - "Option C: If A/B both fail, what side-door path exists?"
    - "Motive alignment: Which human motive can make cooperation easier without coercion?"
    - "Mechanism scan: Where is the real value chain and who captures the upside/downside?"
  apply_to:
    - "high-risk decisions"
    - "strategy planning"
    - "negotiation-heavy tasks"
  source_refs:
    - "mi_20260305_001"
